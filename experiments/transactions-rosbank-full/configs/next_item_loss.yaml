module:
  loss_projection_partial:
    _target_: pretpp.nn.MultiHead  # labels.
    _partial_: true
    head_partial:
      _target_: hotpp.nn.Head
      _partial_: true
      hidden_dims: [128]
    head_output_sizes:
      labels: ${num_classes}
      timestamps: 1
      currency: 68
      channel_type: 7
      trx_category: 11
      log_amount: 1
  loss:
    _target_: pretpp.losses.NextItemLoss
    losses:
      timestamps:
        _target_: hotpp.losses.TimeMAELoss
        max_delta: ${max_time_delta}
        smoothing: 1
        grad_scale: 0.05
      labels:
        _target_: hotpp.losses.CrossEntropyLoss
        num_classes: ${num_classes}
      currency:
        _target_: hotpp.losses.CrossEntropyLoss
        num_classes: 68
        grad_scale: 0.5
      channel_type:
        _target_: hotpp.losses.CrossEntropyLoss
        num_classes: 7
        grad_scale: 0.5
      trx_category:
        _target_: hotpp.losses.CrossEntropyLoss
        num_classes: 11
        grad_scale: 1
      log_amount:
        _target_: hotpp.losses.MAELoss
        grad_scale: 1
