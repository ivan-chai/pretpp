defaults:
  - mtl_loss
  - _self_

data_module:
  _target_: pretpp.data.InterleavedDataModule
  val_period: 2

module:
  _target_: pretpp.modules.HPOModule
  hpo_losses:
    - loss_0_timestamps
    - loss_0_labels
    - loss_0_types
  hp_group_params:
    lr: 0.01
    betas: [0, 0.99]
  hpo_params:
    algorithm: sgd
  downstream_loss: loss_1_target

trainer:
  precision: 32-true
  strategy: ddp_find_unused_parameters_true
