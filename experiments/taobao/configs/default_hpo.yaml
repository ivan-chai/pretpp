defaults:
  - mtl_loss
  - _self_

data_module:
  _target_: pretpp.data.InterleavedDataModule
  val_period: 2

module:
  _target_: pretpp.modules.HPOModule
  hpo_losses:
    - loss_0_timestamps
    - loss_0_labels
    - loss_0_types
  hpo_params:
    algorithm: sgd
    encoder_decoder: true
  downstream_loss: loss_1_target

trainer:
  precision: 32-true
